---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: gpuhealths.gpu.nvidia.com
spec:
  group: gpu.nvidia.com
  names:
    kind: GPUHealth
    listKind: GPUHealthList
    plural: gpuhealths
    shortNames:
    - gh
    singular: gpuhealth
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.gpuID
      name: GPU ID
      type: string
    - jsonPath: .spec.nodeName
      name: Node
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.remediationPolicy
      name: Policy
      type: string
    - jsonPath: .status.remediationAttempts
      name: Attempts
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GPUHealth is the Schema for the gpuhealths API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GPUHealth
            properties:
              gpuID:
                description: gpuID is the hardware identifier of the GPU (e.g. "GPU-00001").
                type: string
              maxRemediationAttempts:
                default: 3
                description: |-
                  maxRemediationAttempts is the number of automated remediation cycles to attempt
                  before escalating to human intervention, regardless of remediationPolicy.
                format: int32
                maximum: 100
                minimum: 1
                type: integer
              nodeName:
                description: nodeName is the Kubernetes node that hosts this GPU.
                type: string
              remediationPolicy:
                default: None
                description: remediationPolicy controls how the operator responds
                  when this GPU enters a critical state.
                enum:
                - None
                - Drain
                - Replace
                - Escalate
                type: string
            required:
            - gpuID
            - nodeName
            - remediationPolicy
            type: object
          status:
            description: status defines the observed state of GPUHealth
            properties:
              conditions:
                description: |-
                  conditions reflect the current state of the GPUHealth resource using
                  standard Kubernetes condition types.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              findings:
                description: |-
                  findings contains diagnostic observations recorded by the operator.
                  Capped at 100 entries; oldest findings are evicted when the limit is reached.
                items:
                  description: Finding records a specific diagnostic observation made
                    by the operator.
                  properties:
                    count:
                      description: count is how many times this finding has been observed
                        since it was first recorded.
                      format: int32
                      minimum: 1
                      type: integer
                    message:
                      description: message is a human-readable description of the
                        finding.
                      type: string
                    observedAt:
                      description: observedAt is the timestamp when this finding was
                        first recorded.
                      format: date-time
                      type: string
                    severity:
                      description: severity indicates how serious this finding is.
                      enum:
                      - Warning
                      - Critical
                      type: string
                    type:
                      description: type identifies the category of problem observed.
                      enum:
                      - XIDError
                      - ECCSingleBitError
                      - ECCDoubleBitError
                      - GPUThermalThrottle
                      - MemoryThermalThrottle
                      - MemoryLeak
                      - PowerCapped
                      - LowUtilization
                      - Unknown
                      type: string
                  required:
                  - count
                  - message
                  - observedAt
                  - severity
                  - type
                  type: object
                maxItems: 100
                type: array
              lastTransitionTime:
                description: lastTransitionTime is when the phase last changed.
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  observedGeneration is the .metadata.generation that this status was computed from.
                  Used to detect whether status is stale relative to the current spec.
                format: int64
                type: integer
              phase:
                description: phase is the current position of this GPU in the health
                  state machine.
                enum:
                - Healthy
                - Warning
                - Critical
                - Draining
                - Recovering
                - Replacing
                - Rejoining
                - Failed
                type: string
              remediationAttempts:
                description: |-
                  remediationAttempts tracks how many automated remediation cycles have been attempted.
                  When this reaches spec.maxRemediationAttempts, the operator sets EscalationRequired.
                format: int32
                type: integer
              replacementStartedAt:
                description: replacementStartedAt is when the node went down for replacement
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
