server {
    listen 80;

    root  /usr/share/nginx/html;
    index index.html;

    # SPA — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → telemetry service (strips /api prefix to match Vite dev proxy)
    # SSE-aware: buffering disabled, long read timeout, HTTP/1.1 keep-alive
    location /api/ {
        proxy_pass         http://telemetry:3000/;
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header   Connection  '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 24h;
    }
}
